<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tienda de Mascotas - Nuevos Ajustes</title>
    </head>
    <body>
        <header>
            <h1>Tienda de Mascotas</h1>
            <p>Encuentra a tu compañero ideal.</p>
        </header>

        <nav>
            <a href="#inicio">Inicio</a> | <a href="#mascotas">Mascotas</a> |
            <a href="#contacto">Contacto</a>
        </nav>

        <hr />

        <section id="mascotas">
            <h2>Mascotas Disponibles</h2>

            <article>
                <h3>Firulais</h3>
                <p>Especie: Perro</p>
                <p>Edad: 3 años</p>
                <p>Precio: $500.000</p>
            </article>

            <article>
                <h3>Misu</h3>
                <p>Especie: Gato</p>
                <p>Edad: 2 años</p>
                <p>Precio: $350.000</p>
            </article>
        </section>

        <hr />

        <section id="contacto">
            <h2>Contáctanos</h2>

            <form>
                <label for="nombre">Nombre:</label><br />
                <input type="text" id="nombre" name="nombre" /><br /><br />

                <label for="correo">Correo:</label><br />
                <input type="email" id="correo" name="correo" /><br /><br />

                <label for="mensaje">Mensaje:</label><br />
                <textarea id="mensaje" name="mensaje"></textarea><br /><br />

                <button type="submit">Enviar</button>
            </form>
        </section>

        <hr />

        <footer>
            <p>&copy; 2026 Tienda de Mascotas</p>
        </footer>
    </body>
</html>
